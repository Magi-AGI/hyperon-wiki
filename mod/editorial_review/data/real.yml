# Editorial Review Workflow
# Card types, roles, codenames, and permission rules for the
# Draft -> AI Reviewed -> Human Approved -> Published pipeline.
# Optionally, domain experts can add an "Expert Approved" endorsement.

# =============================================================
# Roles
# =============================================================

- :name: Expert
  :type: :role
  :codename: expert
  :fields:
    :description: |-
      Domain experts who can endorse published content with the
      "expert approved" seal. Granted by administrators based on
      demonstrated expertise (later phases will infer this from
      participation in source data like transcripts and meetings).

# =============================================================
# Card Types
# =============================================================

- :name: Draft
  :type: :cardtype
  :codename: draft
  :fields:
    :description: |-
      Unpublished content pending review. Visible to signed-in users only.
      Guests cannot see Draft cards.
    :type:
      :fields:
        :read: Anyone Signed In
        :create: Anyone Signed In
        :update: Anyone Signed In
        :delete:
          - :administrator

- :name: Published
  :type: :cardtype
  :codename: published
  :fields:
    :description: |-
      Human-approved content visible to everyone.
    :type:
      :fields:
        :read: Anyone
        :create: Anyone Signed In
        :update: Anyone Signed In
        :delete:
          - :administrator

- :name: RawData
  :type: :cardtype
  :codename: raw_data
  :fields:
    :description: |-
      Raw source material (transcripts, chat logs, meeting notes).
      Restricted to administrators and editors.
    :type:
      :fields:
        :read:
          - :administrator
        :create:
          - :administrator
        :update:
          - :administrator
        :delete:
          - :administrator

# =============================================================
# Codenames for child card fields (right-set registration)
# =============================================================

- :name: ai draft
  :codename: ai_draft

- :name: approved by
  :codename: approved_by

- :name: approved at
  :codename: approved_at

- :name: expert approved by
  :codename: expert_approved_by

- :name: expert approved at
  :codename: expert_approved_at

- :name: ai reviewed by
  :codename: ai_reviewed_by

- :name: ai reviewed at
  :codename: ai_reviewed_at

- :name: authored by
  :codename: authored_by

- :name: generated by
  :codename: generated_by

# =============================================================
# Tags (provenance and approval status)
# =============================================================

- :name: ai generated
  :codename: ai_generated

- :name: human authored
  :codename: human_authored

- :name: transcript derived
  :codename: transcript_derived

- :name: needs review
  :codename: needs_review

- :name: ai reviewed
  :codename: ai_reviewed

- :name: human approved
  :codename: human_approved

- :name: expert approved
  :codename: expert_approved

# =============================================================
# Review Queue (Search card)
# =============================================================

- :name: Review Queue
  :type: :search_type
  :codename: review_queue
  :content: '{"type":"draft","sort":"create","dir":"asc"}'
  :fields:
    :self:
      :fields:
        :read: Anyone Signed In
